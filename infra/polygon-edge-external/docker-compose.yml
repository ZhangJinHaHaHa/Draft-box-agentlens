services:
  polygon-edge-external:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polygon-edge-external
    user: "0:0"
    env_file:
      - .env
    ports:
      - "${EDGE_EXTERNAL_RPC_PORT:-18545}:8545"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "/bin/sh", "/app/scripts/healthcheck.sh"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
