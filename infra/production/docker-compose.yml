services:
  # ============================================================================
  # Listener — polls on-chain AuditRequested events, runs sandbox audit,
  #            writes results back to the registry contract
  # ============================================================================
  listener:
    build:
      context: ../..
      dockerfile: infra/production/Dockerfile
      target: runtime
    image: agent-shenji:latest
    container_name: shenji-listener
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    command: ["node", "sandbox/dist/src/cli/listener.js"]
    env_file:
      - .env
    environment:
      - AUDIT_LISTENER_STATE_DIR=/app/.runtime/listener
      - AUDIT_WRITEBACK_ENABLED=true
      - AUDIT_DOCKER_NETWORK=polygon-edge-external_default
    volumes:
      - listener-state:/app/.runtime/listener
      - reports-store:/app/.runtime/reports-store
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      report-gateway:
        condition: service_healthy

  # ============================================================================
  # Report Gateway — serves audit reports via HTTP (proxies to COS/IPFS/local)
  # ============================================================================
  report-gateway:
    image: agent-shenji:latest
    container_name: shenji-report-gateway
    restart: unless-stopped
    command: ["node", "sandbox/dist/src/cli/reportGateway.js"]
    env_file:
      - .env
    environment:
      - AUDIT_REPORT_GATEWAY_HOST=0.0.0.0
      - AUDIT_REPORT_GATEWAY_PORT=3310
    volumes:
      - reports-store:/app/.runtime/reports-store:ro
    ports:
      - "${REPORT_GATEWAY_PORT:-3310}:3310"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://127.0.0.1:3310/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================================================
  # Appeal API — handles appeal submissions and review workflow
  # ============================================================================
  appeal-api:
    image: agent-shenji:latest
    container_name: shenji-appeal-api
    restart: unless-stopped
    command: ["node", "sandbox/dist/src/cli/appealApi.js"]
    env_file:
      - .env
    environment:
      - AUDIT_APPEAL_API_HOST=0.0.0.0
      - AUDIT_APPEAL_API_PORT=3312
      - AUDIT_APPEAL_STATE_DIR=/app/.runtime/appeals
      - AUDIT_APPEAL_ADMIN_TOKEN=${AUDIT_APPEAL_ADMIN_TOKEN:-}
    ports:
      - "${APPEAL_API_PORT:-3312}:3312"
    volumes:
      - appeal-state:/app/.runtime/appeals
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const c=n.connect(3312,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ============================================================================
  # Frontend — nginx serving React SPA + reverse proxy to backend APIs
  # ============================================================================
  frontend:
    build:
      context: ../..
      dockerfile: infra/production/Dockerfile
      target: frontend
      args:
        - VITE_AUDIT_RPC_URL=${VITE_AUDIT_RPC_URL:-}
        - VITE_AUDIT_REGISTRY_ADDRESS=${VITE_AUDIT_REGISTRY_ADDRESS:-}
        - VITE_AUDIT_CHAIN_ID=${VITE_AUDIT_CHAIN_ID:-}
        - VITE_AUDIT_REPORT_GATEWAY_URL=${VITE_AUDIT_REPORT_GATEWAY_URL:-/api/reports/}
        - VITE_AUDIT_APPEAL_API_URL=${VITE_AUDIT_APPEAL_API_URL:-/api/appeals}
        - VITE_AUDIT_ATTESTATION_EXPECTED_PROVIDER_TYPE=${VITE_AUDIT_ATTESTATION_EXPECTED_PROVIDER_TYPE:-}
        - VITE_AUDIT_ATTESTATION_EXPECTED_MEASUREMENT=${VITE_AUDIT_ATTESTATION_EXPECTED_MEASUREMENT:-}
        - VITE_AUDIT_ATTESTATION_EXPECTED_QUOTE_FORMAT=${VITE_AUDIT_ATTESTATION_EXPECTED_QUOTE_FORMAT:-}
        - VITE_AUDIT_ATTESTATION_VERIFY_REPORT_DATA_BINDING=${VITE_AUDIT_ATTESTATION_VERIFY_REPORT_DATA_BINDING:-}
    image: agent-shenji-frontend:latest
    container_name: shenji-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - manifests:/usr/share/nginx/html/manifests:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      report-gateway:
        condition: service_healthy
      appeal-api:
        condition: service_healthy

volumes:
  listener-state:
    driver: local
  reports-store:
    driver: local
  appeal-state:
    driver: local
  manifests:
    driver: local

networks:
  default:
    name: polygon-edge-external_default
    external: true
