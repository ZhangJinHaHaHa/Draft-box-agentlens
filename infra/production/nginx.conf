# ---------------------------------------------------------------------------
# Rate limiting zones (inside http block via conf.d include)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=appeal:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Reverse proxy: Polygon Edge JSON-RPC (so browser can reach the chain)
    # ---------------------------------------------------------------------------
    location /api/rpc {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://polygon-edge-external:8545/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # JSON-RPC uses POST only
        limit_except POST { deny all; }
    }

    # ---------------------------------------------------------------------------
    # Reverse proxy: Report Gateway
    # ---------------------------------------------------------------------------
    location /api/reports/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://report-gateway:3310/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ---------------------------------------------------------------------------
    # Reverse proxy: Appeal API
    # POST/GET are public; PATCH review is protected by Bearer token at app layer
    # ---------------------------------------------------------------------------
    location /api/appeals/ {
        limit_req zone=appeal burst=20 nodelay;

        proxy_pass http://appeal-api:3312/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ---------------------------------------------------------------------------
    # Static files with caching
    # ---------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Manifest hosting (persistent volume)
    # ---------------------------------------------------------------------------
    location /manifests/ {
        alias /usr/share/nginx/html/manifests/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback — all other routes serve index.html
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;

    # Disable server version disclosure
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
