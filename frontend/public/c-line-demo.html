<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentLens C Line Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      p {
        margin: 6px 0 0;
        color: #5e6b78;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 650;
        color: #334150;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #cbd5df;
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        color: #17202a;
        font: inherit;
      }

      textarea {
        min-height: 128px;
        resize: vertical;
      }

      button {
        border: 1px solid #17202a;
        border-radius: 8px;
        padding: 10px 14px;
        background: #17202a;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border-color: #cbd5df;
        background: #ffffff;
        color: #17202a;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .hero {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
        gap: 16px;
      }

      .panel {
        border: 1px solid #dbe2ea;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .status {
        min-height: 42px;
        border: 1px solid #dbe2ea;
        border-radius: 8px;
        padding: 10px 12px;
        background: #f9fafb;
        color: #334150;
      }

      .status.ok {
        border-color: #9ad0b0;
        background: #effaf3;
      }

      .status.warn {
        border-color: #f2c879;
        background: #fff8e8;
      }

      .status.error {
        border-color: #efa2a2;
        background: #fff0f0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #dbe2ea;
        border-radius: 999px;
        padding: 6px 10px;
        background: #f9fafb;
        font-size: 12px;
        font-weight: 700;
      }

      .cards {
        display: grid;
        gap: 12px;
      }

      .card {
        border: 1px solid #dbe2ea;
        border-radius: 8px;
        padding: 14px;
        background: #ffffff;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0;
      }

      .metric {
        border-radius: 8px;
        background: #f1f4f7;
        padding: 10px;
      }

      .metric span {
        display: block;
        color: #6b7785;
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }

      pre {
        overflow: auto;
        max-height: 360px;
        margin: 0;
        border-radius: 8px;
        background: #111827;
        color: #d1fae5;
        padding: 12px;
        font-size: 12px;
      }

      .muted {
        color: #6b7785;
      }

      @media (max-width: 840px) {
        .hero,
        .grid {
          display: block;
        }

        .panel {
          margin-top: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <div>
          <h1>AgentLens C 线最小验证页</h1>
          <p>只验证 Platform API、Google mock 钱包、积分、付费 LLM 推荐和 fallback。</p>
        </div>
        <div class="pill">静态页，不依赖 React env</div>
      </div>

      <div class="grid">
        <section class="panel stack">
          <h2>1. 输入与操作</h2>
          <div>
            <label for="apiBase">Platform API Base URL</label>
            <input id="apiBase" value="http://127.0.0.1:8790" />
          </div>
          <div>
            <label for="query">用户需求</label>
            <textarea id="query">我需要一个最适合黑客松演示的自托管 RAG 知识库 Agent，最好有 API、能快速集成，并且要说明可信风险取舍。</textarea>
          </div>
          <div class="row">
            <button id="healthBtn" class="secondary" type="button">检查 API</button>
            <button id="connectBtn" type="button">创建 Google Mock 用户</button>
            <button id="recommendBtn" type="button">付费 LLM 推荐一次</button>
            <button id="run3Btn" class="secondary" type="button">连续跑 3 次</button>
          </div>
          <div id="status" class="status">等待操作。</div>
          <div class="row">
            <span class="pill">User: <code id="userId">未创建</code></span>
            <span class="pill">Wallet: <code id="wallet">未创建</code></span>
            <span class="pill">Balance: <code id="balance">-</code></span>
          </div>
        </section>

        <section class="panel stack">
          <h2>2. 最近一次结果</h2>
          <div id="summary" class="status">还没有推荐结果。</div>
          <div id="results" class="cards"></div>
        </section>
      </div>

      <section class="panel stack" style="margin-top: 16px">
        <h2>3. 调试日志</h2>
        <pre id="log">[]</pre>
      </section>
    </main>

    <script>
      const state = {
        user: null,
        creditAccount: null,
        logs: []
      };

      const els = {
        apiBase: document.querySelector("#apiBase"),
        query: document.querySelector("#query"),
        healthBtn: document.querySelector("#healthBtn"),
        connectBtn: document.querySelector("#connectBtn"),
        recommendBtn: document.querySelector("#recommendBtn"),
        run3Btn: document.querySelector("#run3Btn"),
        status: document.querySelector("#status"),
        userId: document.querySelector("#userId"),
        wallet: document.querySelector("#wallet"),
        balance: document.querySelector("#balance"),
        summary: document.querySelector("#summary"),
        results: document.querySelector("#results"),
        log: document.querySelector("#log")
      };

      function apiBase() {
        return els.apiBase.value.replace(/\/+$/, "");
      }

      function setBusy(isBusy) {
        for (const button of [els.healthBtn, els.connectBtn, els.recommendBtn, els.run3Btn]) {
          button.disabled = isBusy;
        }
      }

      function setStatus(message, kind = "") {
        els.status.className = `status ${kind}`.trim();
        els.status.textContent = message;
      }

      function setSummary(message, kind = "") {
        els.summary.className = `status ${kind}`.trim();
        els.summary.textContent = message;
      }

      function log(event, payload) {
        state.logs.unshift({
          at: new Date().toISOString(),
          event,
          payload
        });
        state.logs = state.logs.slice(0, 20);
        els.log.textContent = JSON.stringify(state.logs, null, 2);
      }

      function refreshUser() {
        els.userId.textContent = state.user?.platformUserId ?? "未创建";
        els.wallet.textContent = state.user?.walletAddress ?? "未创建";
        els.balance.textContent = state.creditAccount?.balance ?? "-";
      }

      async function fetchJson(path, options = {}) {
        const timeoutMs = options.timeoutMs ?? 22000;
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), timeoutMs);

        try {
          const response = await fetch(`${apiBase()}${path}`, {
            method: options.method ?? "GET",
            headers: options.body ? { "Content-Type": "application/json" } : undefined,
            body: options.body ? JSON.stringify(options.body) : undefined,
            signal: controller.signal
          });
          const json = await response.json();
          if (!response.ok) {
            throw new Error(json.error || `HTTP ${response.status}`);
          }
          return json;
        } catch (error) {
          if (error && error.name === "AbortError") {
            throw new Error(`请求 ${timeoutMs}ms 超时`);
          }
          throw error;
        } finally {
          window.clearTimeout(timeout);
        }
      }

      async function checkHealth() {
        setBusy(true);
        setStatus("正在检查 API...");
        try {
          const json = await fetchJson("/health", { timeoutMs: 5000 });
          setStatus(`API 正常：engine=${json.recommendationEngine}, cost=${json.recommendationCostCredits}`, "ok");
          log("health", json);
        } catch (error) {
          setStatus(error.message, "error");
          log("health_error", { message: error.message });
        } finally {
          setBusy(false);
        }
      }

      async function connectUser() {
        setBusy(true);
        setStatus("正在创建 Google mock 用户...");
        try {
          const runId = Date.now().toString(36);
          const json = await fetchJson("/api/web2/google/mock", {
            method: "POST",
            body: {
              googleSubject: `c-line-demo-${runId}`,
              email: `c-line-demo-${runId}@example.com`,
              emailVerified: true
            }
          });
          state.user = json.user;
          state.creditAccount = json.creditAccount;
          refreshUser();
          setStatus("Google mock 用户已创建，钱包和初始积分可用。", "ok");
          log("connect_user", json);
        } catch (error) {
          setStatus(error.message, "error");
          log("connect_user_error", { message: error.message });
        } finally {
          setBusy(false);
        }
      }

      async function ensureUser() {
        if (!state.user) {
          await connectUser();
        }
        if (!state.user) {
          throw new Error("还没有可用用户。");
        }
      }

      async function runRecommendation() {
        setBusy(true);
        setStatus("正在请求付费 LLM 推荐，最多等待 22 秒...");
        const startedAt = performance.now();
        try {
          await ensureUser();
          const json = await fetchJson("/api/recommendations/llm", {
            method: "POST",
            timeoutMs: 22000,
            body: {
              userId: state.user.platformUserId,
              query: els.query.value,
              priorities: ["self-host", "audited", "fast-start"],
              riskTolerance: "low",
              limit: 3
            }
          });
          const elapsedMs = Math.round(performance.now() - startedAt);
          state.creditAccount = json.creditAccount;
          refreshUser();
          renderRecommendation(json, elapsedMs);
          log("paid_recommendation", { elapsedMs, ...json });
        } catch (error) {
          setStatus(error.message, "error");
          setSummary("推荐请求失败。", "error");
          log("paid_recommendation_error", { message: error.message });
        } finally {
          setBusy(false);
        }
      }

      async function runThreeTimes() {
        for (let index = 0; index < 3; index += 1) {
          await runRecommendation();
        }
      }

      function renderRecommendation(response, elapsedMs) {
        const kind = response.fallbackUsed ? "warn" : "ok";
        const chargedText = response.charged ? `已扣 ${response.costCredits} 积分` : "未扣积分";
        const fallbackText = response.fallbackUsed ? ` fallback: ${response.fallbackReason || "yes"}` : "";
        setStatus(`推荐返回，耗时 ${elapsedMs}ms，${chargedText}。`, kind);
        setSummary(
          `engine=${response.engine}, charged=${response.charged}, balance=${response.creditAccount.balance}.${fallbackText}`,
          kind
        );

        const results = response.recommendation?.results ?? [];
        els.results.innerHTML = results
          .map((item, index) => {
            const reasons = (item.reasons || [])
              .map((reason) => `<p>${escapeHtml(reason.zh || reason.en || "")}</p>`)
              .join("");
            const tradeoffs = (item.tradeoffs || [])
              .map((tradeoff) => `<p class="muted">取舍：${escapeHtml(tradeoff.zh || tradeoff.en || "")}</p>`)
              .join("");
            return `
              <article class="card">
                <h3>#${index + 1} ${escapeHtml(item.agentId)} · score ${Math.round(item.score)}</h3>
                <div class="metrics">
                  <div class="metric"><span>Fit</span><strong>${numberText(item.fitScore)}</strong></div>
                  <div class="metric"><span>Trust</span><strong>${numberText(item.trustScore)}</strong></div>
                  <div class="metric"><span>Risk</span><strong>${numberText(item.riskScore)}</strong></div>
                </div>
                <div class="row">
                  <span class="pill">${escapeHtml(item.confidence || "no-confidence")}</span>
                  <span class="pill">${escapeHtml(item.recommendationType || "no-type")}</span>
                </div>
                ${reasons}
                ${tradeoffs}
                <p class="muted">evidence: ${escapeHtml((item.evidenceUsed || []).join(", "))}</p>
                <p class="muted">missing: ${escapeHtml((item.missingEvidence || []).join(", "))}</p>
              </article>
            `;
          })
          .join("");
      }

      function numberText(value) {
        return typeof value === "number" ? Math.round(value) : "-";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      els.healthBtn.addEventListener("click", checkHealth);
      els.connectBtn.addEventListener("click", connectUser);
      els.recommendBtn.addEventListener("click", runRecommendation);
      els.run3Btn.addEventListener("click", runThreeTimes);

      checkHealth();
    </script>
  </body>
</html>
